name: Test

on: [push]

env:
  RAILS_ENV: test
  ENVIRONMENT: test

jobs:
  tests:
    name: Run rspec and rubocop
    runs-on: ubuntu-latest
    env:
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      # CI-ONLY: points at the ephemeral `redis` service container below, which is
      # created and destroyed with this job. This is NOT a real environment's Redis —
      # the deployed REDIS_URL is injected by Terraform into the App Service settings
      # (see terraform-azure/local.tf). It exists so the Redis-backed specs actually
      # run in CI instead of skipping.
      REDIS_URL: redis://localhost:6379/0
    # CI-ONLY throwaway Redis used by the test suite (spun up by GitHub Actions for the
    # duration of this job). Not used by, or related to, any deployed environment.
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.8

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Install gems
        run: |
          bundle config path vendor/bundle
          bundle install --jobs 20 --retry 3

      - name: Install yarn
        run: npm install yarn -g

      - name: Install node.js dependencies
        run: yarn install

      - name: Compile assets
        run: bin/rails assets:precompile

      - name: Run rubocop
        run: bundle exec rubocop

      - name: Run tests
        run: bundle exec rspec
