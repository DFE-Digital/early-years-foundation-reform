---
services:
  app:
    container_name: reform_dev
    build:
      target: dev
    image: reform:dev
    command: foreman start -f Procfile.dev
    healthcheck:
      test: curl --fail http://localhost:3000/health || exit 1
    restart: on-failure
    environment:
      - ENVIRONMENT=
      - RAILS_ENV=development
      - DOMAIN=localhost:3000
      - RAILS_SERVE_STATIC_FILES=true
    volumes:
      - .:/srv
    tty: true
    stdin_open: true
    depends_on:
      - redis

  # Optional shared cache for local development. The app only uses it when
  # REDIS_URL is set (see config/environments/development.rb); otherwise dev
  # falls back to its usual null/memory store. Reachable from the app container
  # as host `redis` — i.e. REDIS_URL=redis://redis:6379/0
  redis:
    container_name: reform_redis_dev
    image: redis:7-alpine
    networks:
      - reform

  doc:
    container_name: reform_doc
    image: reform:dev
    command: yard server
    healthcheck:
      test: curl --fail http://localhost:8808 || exit 1
    volumes:
      - .:/srv
    ports:
      - 8808:8808
    networks:
      - reform
